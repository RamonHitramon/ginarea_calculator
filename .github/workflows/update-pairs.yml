name: Update trading pairs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh pairs from ginarea API
        run: python3 scripts/update_pairs.py

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --porcelain markets.json pairs-*.json)" ]; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add markets.json pairs-*.json
          git commit -m "chore: refresh trading pairs from ginarea API"
          git push
