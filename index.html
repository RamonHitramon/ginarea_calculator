<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#0c1010">
    <title>Калькулятор переехал</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #46c280;
            --bg: #0c1010;
            --bg-card: #181e1e;
            --fg: #e8efe9;
            --fg-muted: #8a9590;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--fg);
        }
        .link {
            display: inline-block;
            margin-top: 8px;
            padding: 14px 28px;
            background: var(--primary);
            color: #0c1010;
            text-decoration: none;
            font-weight: 600;
            border-radius: 10px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            word-break: break-all;
        }
        .link:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(70, 194, 128, 0.25);
        }
        .url {
            display: block;
            margin-top: 20px;
            font-size: 13px;
            color: var(--fg-muted);
            word-break: break-all;
        }
        .url a { color: var(--fg-muted); text-decoration: none; }
        .url a:hover { color: var(--primary); }
    </style>
</head>
<body>
    <main class="card">
        <h1>Калькулятор переехал</h1>
        <a class="link" href="https://creamdotfun.vercel.app/calc">Открыть новый калькулятор</a>
        <span class="url"><a href="https://creamdotfun.vercel.app/calc">creamdotfun.vercel.app/calc</a></span>
    </main>
</body>
</html>
